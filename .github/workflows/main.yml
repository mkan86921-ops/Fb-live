name: M3U8 to YouTube Live (No Secret)

on:
  workflow_dispatch:

jobs:
  live:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install ffmpeg -y

      - name: Start Live Stream
        run: |
          ffmpeg -re -i "https://tvsen6.aynaott.com/independenttv/index.m3u8" \
          -c:v libx264 -preset veryfast -b:v 2500k \
          -c:a aac -b:a 128k \
          -f flv "rtmps://live-api-s.facebook.com:443/rtmp/FB-122221934408563940-0-Ab7jpSN2dWEV86BgYbFcVGPW"
