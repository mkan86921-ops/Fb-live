name: M3U8 Live Problem Checker

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install ffmpeg -y

      - name: Check M3U8 Input
        run: |
          echo "Testing M3U8 stream..."
          ffprobe -v error -show_format -show_streams \
          "https://tvsen6.aynaott.com/independenttv/index.m3u8"

      - name: Test 10 sec decode
        run: |
          echo "Testing decode (10 sec only)..."
          ffmpeg -loglevel warning -i \
          "https://tvsen6.aynaott.com/independenttv/index.m3u8" \
          -t 10 -f null -

      - name: Test RTMP connection
        run: |
          echo "Testing RTMP connection..."
          ffmpeg -re -f lavfi -i testsrc=size=1280x720:rate=30 \
          -t 5 -c:v libx264 -f flv \
          "rtmps://live-api-s.facebook.com:443/rtmp/FB-122221934408563940-1-Ab7N7bFNzKjN171cjEJXLWNh"
